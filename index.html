<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wskaźniki" />
  <meta name="theme-color" content="#111111" />
  <title>Wskaźniki Techniczne</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --accent: #c8ff00;
      --red: #ff6b6b;
      --blue: #4a9eff;
      --green: #4aff88;
      --text: #eee;
      --muted: #555;
      --font: 'IBM Plex Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #111;
      border-bottom: 1px solid var(--border);
      padding: 16px 16px 12px;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: 3px; }
    .logo span { color: var(--accent); }
    .count { font-size: 9px; color: var(--muted); letter-spacing: 2px; }

    /* Search */
    .search-wrap { position: relative; }
    .search-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px 10px 36px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }

    /* ── CATEGORY TABS ── */
    .tabs-wrap {
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
    }

    /* ── LIST ── */
    .list-wrap {
      height: calc(100vh - 160px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 16px 32px;
    }

    .section-title {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--muted);
      padding: 16px 0 8px;
      text-transform: uppercase;
    }

    .indicator-btn {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .indicator-btn:active { transform: scale(0.98); }
    .indicator-btn:hover { border-color: #3a3a3a; }

    .ind-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
    .ind-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .ind-info { min-width: 0; }
    .ind-name {
      font-size: 13px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ind-short { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 1px; }
    .ind-tag {
      flex-shrink: 0;
      font-size: 8px;
      letter-spacing: 1px;
      padding: 3px 7px;
      border-radius: 4px;
      border: 1px solid;
      font-weight: 700;
    }
    .arrow { color: var(--muted); font-size: 12px; flex-shrink: 0; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      width: 100%;
      max-height: 85vh;
      background: #181818;
      border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .modal-overlay.open .modal {
      transform: translateY(0);
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: #333;
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }
    .modal-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-tag-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .modal-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .modal-name {
      font-size: 20px; font-weight: 700; color: #fff;
    }
    .modal-short {
      font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-top: 2px;
    }
    .modal-body {
      padding: 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }
    .modal-desc {
      font-size: 13px;
      line-height: 1.9;
      color: #ccc;
    }
    .modal-desc p { margin-bottom: 14px; }
    .modal-desc p:last-child { margin-bottom: 0; }

    .modal-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .modal-section-title {
      font-size: 9px; letter-spacing: 3px; color: var(--muted);
      margin-bottom: 12px; text-transform: uppercase;
    }
    .signal-row {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 10px;
    }
    .signal-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0; margin-top: 4px;
    }
    .signal-text { font-size: 12px; color: #aaa; line-height: 1.6; }
    .signal-text b { color: #fff; }

    .tip-box {
      background: #1e2a00;
      border: 1px solid #2a3a00;
      border-radius: 10px;
      padding: 14px;
      margin-top: 16px;
    }
    .tip-label { font-size: 9px; color: #8aaa00; letter-spacing: 2px; margin-bottom: 8px; }
    .tip-text { font-size: 12px; color: #aaa; line-height: 1.7; }

    .close-btn {
      margin: 16px 20px;
      width: calc(100% - 40px);
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .empty {
      text-align: center;
      padding: 48px 16px;
      color: var(--muted);
      font-size: 13px;
    }
    .empty-icon { font-size: 32px; margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">IND<span>EX</span></div>
    <div class="count" id="countLabel">35 WSKAŹNIKÓW</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="Szukaj wskaźnika..." id="searchInput" oninput="filterIndicators()" />
  </div>
</div>

<div class="tabs-wrap" id="tabs">
  <button class="tab active" onclick="filterCategory('all', this)">WSZYSTKIE</button>
  <button class="tab" onclick="filterCategory('trend', this)">TREND</button>
  <button class="tab" onclick="filterCategory('momentum', this)">MOMENTUM</button>
  <button class="tab" onclick="filterCategory('volatility', this)">ZMIENNOŚĆ</button>
  <button class="tab" onclick="filterCategory('volume', this)">WOLUMEN</button>
</div>

<div class="list-wrap" id="listWrap"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-tag-row">
        <div class="modal-icon" id="mIcon"></div>
        <div>
          <div class="modal-name" id="mName"></div>
          <div class="modal-short" id="mShort"></div>
        </div>
      </div>
    </div>
    <div class="modal-body" id="mBody"></div>
    <button class="close-btn" onclick="closeModalBtn()">ZAMKNIJ</button>
  </div>
</div>

      'Mierzy gdzie cena zamknięcia jest względem najwyższego High z ostatnich N świeczek. Skala od <b>0 do -100</b> — blisko 0 = cena blisko szczytu (wykupiona), blisko -100 = cena blisko dołka (wyprzedana).',
      'Bardzo podobny do Stochastic %K ale odwrócony. Williams używał go głównie do znajdowania <b>krótkoterminowych odwróceń w kierunku głównego trendu</b> — kupował wyprzedania w trendzie wzrostowym.'
    ],
    signals: [
      { color: '#ff6b6b', text: '<b>W%R powyżej -20</b> — wykupiony, możliwy sygnał sprzedaży' },
      { color: '#4aff88', text: '<b>W%R poniżej -80</b> — wyprzedany, możliwy sygnał kupna' },
      { color: '#c8ff00', text: '<b>W%R wychodzi z strefy wyprzedania w trendzie wzrostowym</b> — sygnał kupna' },
    ],
    tip: 'Williams %R działa najlepiej gdy handlujesz w kierunku głównego trendu. Na trendzie wzrostowym szukaj wejść gdy W%R spada do -80 i zaczyna rosnąć — to klasyczna strategia Williamsa.'
  }
];

let currentCategory = 'all';
let currentSearch = '';

function renderList() {
  const wrap = document.getElementById('listWrap');
  const search = currentSearch.toLowerCase();

  let filtered = indicators.filter(ind => {
    const matchCat = currentCategory === 'all' || ind.category === currentCategory;
    const matchSearch = !search ||
      ind.name.toLowerCase().includes(search) ||
      ind.short.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });

  document.getElementById('countLabel').textContent = filtered.length + ' WSKAŹNIKÓW';

  if (filtered.length === 0) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>Nie znaleziono wskaźnika<br><span style="font-size:11px;color:#333">${currentSearch}</span></div>`;
    return;
  }

  // Group by category when showing all
  let html = '';
  if (currentCategory === 'all' && !search) {
    const groups = {
      trend: { label: 'TREND', items: [] },
      momentum: { label: 'MOMENTUM', items: [] },
      volatility: { label: 'ZMIENNOŚĆ', items: [] },
      volume: { label: 'WOLUMEN', items: [] }
    };
    filtered.forEach(ind => groups[ind.category].items.push(ind));
    Object.values(groups).forEach(g => {
      if (g.items.length) {
        html += `<div class="section-title">${g.label}</div>`;
        g.items.forEach(ind => html += renderCard(ind));
      }
    });
  } else {
    filtered.forEach(ind => html += renderCard(ind));
  }

  wrap.innerHTML = html;
}

function renderCard(ind) {
  return `
    <button class="indicator-btn" onclick="openModal('${ind.id}')">
      <div class="ind-left">
        <div class="ind-icon" style="background:${ind.iconBg}">${ind.icon}</div>
        <div class="ind-info">
          <div class="ind-name">${ind.name}</div>
          <div class="ind-short">${ind.short}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="ind-tag" style="color:${ind.tagColor};background:${ind.tagBg};border-color:${ind.tagColor}33">${ind.tag}</div>
        <div class="arrow">›</div>
      </div>
    </button>`;
}

function filterCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function filterIndicators() {
  currentSearch = document.getElementById('searchInput').value;
  renderList();
}

function openModal(id) {
  const ind = indicators.find(i => i.id === id);
  if (!ind) return;

  document.getElementById('mIcon').style.background = ind.iconBg;
  document.getElementById('mIcon').textContent = ind.icon;
  document.getElementById('mName').textContent = ind.name;
  document.getElementById('mShort').textContent = ind.short;

  let body = '<div class="modal-desc">';
  ind.desc.forEach(p => body += `<p>${p}</p>`);
  body += '</div>';

  if (ind.signals) {
    body += `<div class="modal-section">
      <div class="modal-section-title">SYGNAŁY</div>`;
    ind.signals.forEach(s => {
      body += `<div class="signal-row">
        <div class="signal-dot" style="background:${s.color}"></div>
        <div class="signal-text">${s.text}</div>
      </div>`;
    });
    body += '</div>';
  }

  if (ind.tip) {
    body += `<div class="tip-box">
      <div class="tip-label">💡 WSKAZÓWKA</div>
      <div class="tip-text">${ind.tip}</div>
    </div>`;
  }

  document.getElementById('mBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}

function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Swipe down to close modal
let startY = 0;
document.getElementById('modal').addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
document.getElementById('modal').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - startY > 80) closeModalBtn();
});

renderList();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
